:root{

}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  font-family:'Share Tech Mono',monospace;
  touch-action:none;user-select:none;
}

#root{display:flex;flex-direction:column;width:100%;height:100%}
#hud-top{
  background:var(--hud);border-bottom:1px solid #0f2030;
  padding:5px 12px;padding-top:calc(var(--st)+5px);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:8px
}
#arena{flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;min-height:0;background:var(--bg)}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ctrl-bar{
  background:var(--hud);border-top:1px solid #0f2030;
  padding:8px 16px;padding-bottom:calc(8px + var(--sb));
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0
}
@media (hover: hover) and (pointer: fine) {
  #ctrl-bar{display:none}
  #hud-top{padding-bottom:8px}
}

.hud-grp{display:flex;flex-direction:column;align-items:center;gap:1px}
.hud-lbl{font-size:8px;color:#335;letter-spacing:2px;text-transform:uppercase}
.hud-val{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--c)}
#h-lvl .hud-val{color:var(--m)}
#h-deaths .hud-val{color:var(--r)}
#h-msg{
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  color:var(--y);letter-spacing:1px;text-align:center;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:0;transition:opacity .2s
}
#h-msg.show{opacity:1}

.btn-grp{display:flex;gap:8px}
.ctrl-btn{
  border-radius:8px;background:#080c18;
  border:1px solid #1a2a3a;color:#557;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .08s;flex-shrink:0
}
.ctrl-btn:active,.ctrl-btn.pressed{
  background:#0a2030;border-color:var(--c);color:var(--c);
  box-shadow:0 0 8px var(--c)
}
.dir-btn{width:52px;height:52px;font-size:18px}
#btn-pause{font-size:14px;width:44px;height:44px}

#overlay{
  position:absolute;inset:0;z-index:20;
  background:rgba(4,6,15,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .3s
}
#overlay.off{opacity:0;pointer-events:none}
#ov-pre{font-size:10px;color:#335;letter-spacing:4px;text-transform:uppercase}
#ov-title{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(28px,7vw,52px);
  color:var(--c);text-shadow:0 0 30px var(--c),0 0 60px var(--c);
  letter-spacing:4px;text-align:center;line-height:1

#ov-sub{font-size:12px;color:#556;letter-spacing:3px;text-align:center}
#ov-tip{
  font-size:11px;color:var(--y);letter-spacing:1px;text-align:center;

.ov-btn{

  font-size:13px;letter-spacing:3px;cursor:pointer;border:none;
  padding:12px 32px;background:var(--c);color:#000;

  transition:background .1s;margin-top:4px

.ov-btn:active,.ov-btn:hover{background:#fff}
.ov-btn.alt{background:var(--m);color:#000}

#arena::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);

  25%{transform:translate(-4px,2px)}
  50%{transform:translate(4px,-2px)}

'use strict';
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function initAudio(){ if(!actx) actx=new AudioCtx(); }

function sfx(type){
  try{
    if(!actx) return;
    const g=actx.createGain(), o=actx.createOscillator();
    o.connect(g); g.connect(actx.destination);
    const now=actx.currentTime;
    if(type==='jump'){
      o.type='square'; o.frequency.setValueAtTime(220,now);
      o.frequency.exponentialRampToValueAtTime(440,now+.08);
      g.gain.setValueAtTime(.18,now); g.gain.exponentialRampToValueAtTime(.001,now+.12);
      o.start(now); o.stop(now+.12);
    } else if(type==='die'){
      o.type='sawtooth'; o.frequency.setValueAtTime(440,now);
      o.frequency.exponentialRampToValueAtTime(55,now+.35);
      g.gain.setValueAtTime(.25,now); g.gain.exponentialRampToValueAtTime(.001,now+.35);
      o.start(now); o.stop(now+.35);
    } else if(type==='trap'){
      o.type='square'; o.frequency.setValueAtTime(880,now);
      o.frequency.exponentialRampToValueAtTime(110,now+.15);
      g.gain.setValueAtTime(.2,now); g.gain.exponentialRampToValueAtTime(.001,now+.15);
      o.start(now); o.stop(now+.15);
    } else if(type==='win'){
      o.type='triangle'; o.frequency.setValueAtTime(440,now);
      o.frequency.linearRampToValueAtTime(880,now+.1);
      o.frequency.linearRampToValueAtTime(1760,now+.2);
      g.gain.setValueAtTime(.22,now); g.gain.exponentialRampToValueAtTime(.001,now+.3);
      o.start(now); o.stop(now+.3);
    } else if(type==='troll'){
      o.type='sine'; o.frequency.setValueAtTime(660,now);
      o.frequency.exponentialRampToValueAtTime(220,now+.4);
      g.gain.setValueAtTime(.2,now); g.gain.setValueAtTime(.2,now+.35);
      g.gain.exponentialRampToValueAtTime(.001,now+.5);
      o.start(now); o.stop(now+.5);
    } else if(type==='land'){
      o.type='square'; o.frequency.setValueAtTime(120,now);
      o.frequency.exponentialRampToValueAtTime(60,now+.05);
      g.gain.setValueAtTime(.12,now); g.gain.exponentialRampToValueAtTime(.001,now+.06);
      o.start(now); o.stop(now+.06);
    }
  }catch(e){}
}

const state = {
  lvlIdx: 0, deaths: 0,
  hi: +(localStorage.getItem('ft_hi')||0),
  player: null, map: null, lvl: null, triggers: null,
  firedTriggers: new Set(), ghostTiles: new Map(), spikeReveal: new Set(),
  exitTrolled: false, fallingBlocks: [], gravFlip: false,
  gravTimer: 0, running: false, paused: false,
  dying: false, deathTimer: 0, flashTimer: 0, invinTimer: 0,
};

const TAUNTS = ['NICE TRY','SKILL ISSUE','PATHETIC','THAT WAS OBVIOUS','LOL','ARE YOU EVEN TRYING?','PREDICTED','L RATIO','STILL ALIVE?','TOUCH GRASS','JUST STOP','PAIN IS INFORMATION','COPE','YOU FOOL','CLASSIC','MAYBE PLAY EASIER','WOW...','BRUH','GET GOOD'];

function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let CW=0, CH=0, SCALE=1;

function resizeCanvas(){
  const arena = document.getElementById('arena');
  const aw = arena.clientWidth, ah = arena.clientHeight;
  const lvl = LEVELS[state.lvlIdx];
  const gw = lvl.pw * CS, gh = lvl.ph * CS;
  SCALE = Math.min(aw/gw, ah/gh, 2);
  CW = Math.floor(gw*SCALE);
  CH = Math.floor(gh*SCALE);
  canvas.width = gw; canvas.height = gh;
  canvas.style.width = CW+'px';
  canvas.style.height = CH+'px';
}

function loadLevel(idx){
  state.lvlIdx = idx;
  const lvl = LEVELS[idx];
  state.lvl = lvl;
  state.map = [...lvl.map];
  state.triggers = lvl.triggers ? lvl.triggers.map(t=>({...t})) : [];
  state.firedTriggers = new Set();
  state.ghostTiles = new Map();
  state.spikeReveal = new Set();
  state.fallingBlocks = [];
  state.gravFlip = false;
  state.gravTimer = 0;
  state.exitTrolled = false;
  state.dying = false;
  state.deathTimer = 0;

  state.player = {
    x: lvl.sx * CS + CS/2 - PLAYER_W/2,
    y: lvl.sy * CS - PLAYER_H,
    vx: 0, vy: 0,
    onGround: false,
    eyeAng: 0, stretch: 1, lean: 0, blinking: 0, trailPts: [],
  };

  resizeCanvas();
  document.getElementById('hv-lvl').textContent = String(idx+1).padStart(2,'0');
}

function tileAt(col, row){
  const lvl = state.lvl;
  if(col<0||row<0||col>=lvl.pw||row>=lvl.ph) return 1;
  return state.map[row*lvl.pw + col];
}
function setTile(col, row, val){
  const lvl = state.lvl;
  if(col<0||row<0||col>=lvl.pw||row>=lvl.ph) return;
  state.map[row*lvl.pw + col] = val;
}
function isSolid(t){ return t===1||t===5||t===6; }

// All spikes (3 and 4) kill from any direction
function touchesSpike(x, y){
  const w = PLAYER_W, h = PLAYER_H;
  const c0 = Math.floor(x/CS), c1 = Math.floor((x+w-1)/CS);
  const r0 = Math.floor(y/CS), r1 = Math.floor((y+h-1)/CS);
  for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
    const t = tileAt(c,r);
    if(t===3 || t===4) return true;
  }
  return false;
}

function killPlayer(){
  if(state.dying || state.invinTimer>0) return;
  state.dying = true;
  state.deathTimer = 60;
  state.deaths++;
  state.flashTimer = 8;
  sfx('die');
  showMsg(rnd(TAUNTS));
  document.getElementById('hv-deaths').textContent = state.deaths;
  document.getElementById('arena').style.animation='shake .25s';
  setTimeout(()=>document.getElementById('arena').style.animation='',280);
}

function respawn(){
  const lvl = state.lvl;
  state.player.x = lvl.sx*CS + CS/2 - PLAYER_W/2;
  state.player.y = lvl.sy*CS - PLAYER_H;
  state.player.vx = 0; state.player.vy = 0;
  state.player.onGround = false;
  state.player.trailPts = [];
  state.dying = false;
  state.invinTimer = 80;
  state.gravFlip = false;
  state.gravTimer = 0;
}

function collideTiles(px, py, vx, vy){
  const p = state.player;
  let nx = px+vx, ny = py+vy;
  const w = PLAYER_W, h = PLAYER_H;
  const gk = (c,r) => c+','+r;

  function checkSolid(x, y){
    const c0 = Math.floor(x/CS), c1 = Math.floor((x+w-1)/CS);
    const r0 = Math.floor(y/CS), r1 = Math.floor((y+h-1)/CS);
    for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
      const t = tileAt(c,r);
      if(t===0 || t===2 || t===8) continue;
      if(t===4){
        if(!state.spikeReveal.has(gk(c,r))){
          state.spikeReveal.add(gk(c,r));
          setTile(c,r,3);
          sfx('trap');
        }
        continue;
      }
      if(t===7){
        if(!state.firedTriggers.has(gk(c,r))){
          state.firedTriggers.add(gk(c,r));
          state.gravFlip = true;
          state.gravTimer = 180;
          showMsg('GRAVITY INVERTED');
          sfx('trap');
        }
        continue;
      }
      return true;
    }
    return false;
  }

  if(checkSolid(nx, py)){ nx=px; p.vx=0; }
  if(checkSolid(nx, ny)){
    if(vy>0) p.onGround=true;
    ny=py; p.vy=0;
  } else { p.onGround=false; }

  // Ghost and fake tiles
  const c0 = Math.floor(nx/CS), c1 = Math.floor((nx+w-1)/CS);
  const r = Math.floor((ny+h)/CS);
  for(let c=c0;c<=c1;c++){
    const t = tileAt(c,r-1);
    if(t===6){
      const k = gk(c,r-1);
      const cnt = (state.ghostTiles.get(k)||0)+1;
      state.ghostTiles.set(k,cnt);
      if(cnt>4){ setTile(c,r-1,0); state.ghostTiles.delete(k); sfx('trap'); }
    }
    if(t===5 && vy>0 && p.onGround){
      const k2 = gk(c,r-1);
      if(!state.firedTriggers.has('f5'+k2)){
        state.firedTriggers.add('f5'+k2);
        setTimeout(()=>setTile(c,r-1,0),300);
        sfx('trap');
      }
    }
  }
  return {nx, ny};
}

function checkTriggers(){
  const p = state.player;
  const pc = (p.x+PLAYER_W/2)/CS, pr = (p.y+PLAYER_H/2)/CS;
  for(const tr of state.triggers){
    if(state.firedTriggers.has(tr.id)) continue;
    const dist = Math.hypot(pc-tr.cx, pr-tr.cy);
    if(dist<tr.r){
      state.firedTriggers.add(tr.id);
      execTrigger(tr);
    }
  }
}

function execTrigger(tr){
  sfx('trap');
  if(tr.action==='drop_block'){
    state.fallingBlocks.push({c:tr.blockCol, fy:0, speed:2, landed:false});
  } else if(tr.action==='spike_wall'){
    for(const c of tr.cols) setTile(c, tr.row, 3);
  } else if(tr.action==='reveal_spikes'){
    for(let r=0;r<state.lvl.ph;r++) for(let c=0;c<state.lvl.pw;c++){
      if(tileAt(c,r)===4) setTile(c,r,3);
    }
  }
}

function updateFallingBlocks(){
  for(let i=state.fallingBlocks.length-1;i>=0;i--){
    const fb = state.fallingBlocks[i];
    if(fb.landed) continue;
    fb.fy += fb.speed; fb.speed = Math.min(fb.speed+0.4, 14);
    const row = Math.floor(fb.fy/CS);
    if(row >= state.lvl.ph-1 || isSolid(tileAt(fb.c, row+1))){
      setTile(fb.c, row, 1);
      state.fallingBlocks.splice(i,1);
      const p = state.player;
      const pc = Math.floor((p.x+PLAYER_W/2)/CS);
      if(pc===fb.c && Math.abs(p.y+PLAYER_H/2 - fb.fy)<CS*1.5) killPlayer();
    }
  }
}

function handleExit(ec, er){
  // Random troll! 50% chance
  const isTroll = Math.random() < 0.5;
  if(isTroll){
    setTile(ec, er, 4); // Convert to hidden spike
    sfx('troll');
    showMsg('NICE TRY - NOT THE EXIT');
    setTimeout(()=>{ setTile(ec, er, 8); }, 1500);
    return;
  }
  sfx('win');
  if(state.lvlIdx < LEVELS.length-1){
    showOverlay('ZONE CLEARED',`ZONE ${state.lvlIdx+1} COMPLETE`,`Deaths: ${state.deaths}`,'NEXT ZONE',()=>{
      loadLevel(state.lvlIdx+1);
      hideOverlay();
    });
  } else {
    localStorage.setItem('ft_hi', state.deaths);
    showOverlay('YOU SURVIVED',`Total deaths: ${state.deaths}`,'ALL ZONES CLEARED','PLAY AGAIN',()=>{
      state.deaths=0;
      document.getElementById('hv-deaths').textContent='0';
      loadLevel(0);
      hideOverlay();
    });
  }
}

function showMsg(txt){
  const el = document.getElementById('h-msg');
  el.textContent=txt; el.classList.add('show');
  clearTimeout(showMsg._t);
  showMsg._t = setTimeout(()=>el.classList.remove('show'),2200);
}

function showOverlay(pre, title, sub, btnTxt, btnCb){
  const ov = document.getElementById('overlay');
  document.getElementById('ov-pre').textContent = pre;
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-sub').textContent = sub;
  document.getElementById('ov-tip').style.display='none';
  const btn = document.getElementById('ov-btn');
  btn.textContent = btnTxt;
  btn.onclick = btnCb;
  ov.classList.remove('off');
}
function hideOverlay(){ document.getElementById('overlay').classList.add('off'); }

function togglePause(){
  if(!state.running) return;
  state.paused = !state.paused;
  if(state.paused){
    showOverlay('PAUSED','','','RESUME',()=>{
      state.paused = false;
      hideOverlay();
    });
  }
}

// PAUSE BUTTON
document.getElementById('btn-pause').addEventListener('click',togglePause);

// RENDERER
const PAL = {
  bg: '#04060f', floor: '#0e2030', floorG: '#1a3a50', steel: '#1a2a3a',
  spike: '#ff3040', spikeG: '#ff8090', ghost: 'rgba(40,180,120,.45)',
  fake: 'rgba(100,80,160,.5)', exit: '#00ffcc', grav: '#ff00aa',
  player: '#e0f0ff', eye: '#00ffcc', pupil: '#003020',
};

function drawTile(col, row, t){
  const x=col*CS, y=row*CS, s=CS;
  if(t===1){
    const grad = ctx.createLinearGradient(x,y,x,y+s);
    grad.addColorStop(0,PAL.floor); grad.addColorStop(1,PAL.steel);
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.roundRect(x+1,y+1,s-2,s-2,2); ctx.fill();
    ctx.strokeStyle = PAL.floorG; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x+2,y+2); ctx.lineTo(x+s-2,y+2); ctx.stroke();
  } else if(t===3 || t===4){
    ctx.fillStyle=PAL.spike;
    const mid=x+s/2, tip=y+2, base=y+s-2, hw=s*0.4;
    ctx.beginPath(); ctx.moveTo(mid,tip); ctx.lineTo(mid+hw,base); ctx.lineTo(mid-hw,base);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.spikeG; ctx.lineWidth=1.5; ctx.stroke();
  } else if(t===5){
    ctx.fillStyle=PAL.fake;
    ctx.beginPath(); ctx.roundRect(x+2,y+2,s-4,s-4,3); ctx.fill();
    ctx.strokeStyle='rgba(160,120,255,.6)'; ctx.lineWidth=1;
    ctx.setLineDash([3,3]); ctx.strokeRect(x+2,y+2,s-4,s-4); ctx.setLineDash([]);
  } else if(t===6){
    ctx.fillStyle=PAL.ghost;
    ctx.fillRect(x+1,y+1,s-2,s-2);
    ctx.strokeStyle='rgba(40,255,150,.5)'; ctx.lineWidth=1;
    ctx.setLineDash([2,2]); ctx.strokeRect(x+1,y+1,s-2,s-2); ctx.setLineDash([]);
  } else if(t===7){
    ctx.fillStyle='#100820';
    ctx.fillRect(x+1,y+1,s-2,s-2);
    ctx.fillStyle='rgba(255,0,170,.25)';
    ctx.fillRect(x+1,y+1,s-2,s-2);
    ctx.strokeStyle=PAL.grav; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x+s/2,y+4); ctx.lineTo(x+s/2-4,y+9); ctx.lineTo(x+s/2+4,y+9); ctx.closePath(); ctx.fill();
    ctx.moveTo(x+s/2,y+s-4); ctx.lineTo(x+s/2-4,y+s-9); ctx.lineTo(x+s/2+4,y+s-9); ctx.closePath(); ctx.fill();
  } else if(t===8){
    const pulse=Math.sin(Date.now()*0.005)*0.4+0.6;
    ctx.fillStyle=`rgba(0,255,200,${pulse*0.18})`;
    ctx.fillRect(x,y,s,s);
    ctx.strokeStyle=`rgba(0,255,200,${pulse})`;
    ctx.lineWidth=2; ctx.strokeRect(x+2,y+2,s-4,s-4);
    ctx.fillStyle=`rgba(0,255,200,${pulse})`;
    ctx.font=`bold ${s*0.5}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('E',x+s/2,y+s/2);
  }
}

function drawFallingBlocks(){
  for(const fb of state.fallingBlocks){
    const x = fb.c*CS, y = fb.fy;
    const g=ctx.createLinearGradient(x,y,x,y+CS);
    g.addColorStop(0,'#e04020'); g.addColorStop(1,'#802010');
    ctx.fillStyle=g; ctx.fillRect(x+1,y+1,CS-2,CS-2);
    ctx.strokeStyle='#ff8060'; ctx.lineWidth=1;
    ctx.strokeRect(x+1,y+1,CS-2,CS-2);
  }
}

function drawPlayer(){
  const p = state.player;
  if(state.dying) return;
  const inv = state.invinTimer>0 && Math.floor(state.invinTimer/4)%2===0;
  if(inv) return;
  const px=Math.round(p.x), py=Math.round(p.y);
  const w=PLAYER_W, h=PLAYER_H;

  for(let i=0;i<p.trailPts.length;i++){
    const tp=p.trailPts[i], alpha=(i/p.trailPts.length)*0.25;
    ctx.fillStyle=`rgba(0,255,200,${alpha})`;
    ctx.fillRect(tp.x+3,tp.y+3,w-6,h-6);
  }

  ctx.save();
  ctx.translate(px+w/2, py+h/2);
  if(p.lean) ctx.rotate(p.lean*0.08);
  ctx.scale(1/p.stretch, p.stretch);
  const hw=w/2, hh=h/2;
  ctx.fillStyle = state.invinTimer>0?'rgba(200,240,255,.6)':PAL.player;
  ctx.beginPath(); ctx.roundRect(-hw,-hh,w,h,4); ctx.fill();
  ctx.strokeStyle = state.gravFlip?PAL.grav:PAL.eye;
  ctx.lineWidth=1.5; ctx.stroke();
  const ex=Math.cos(p.eyeAng)*3, ey=Math.sin(p.eyeAng)*2;
  const eR=w*0.28;
  ctx.fillStyle=PAL.eye;
  ctx.beginPath(); ctx.arc(ex,ey,eR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=PAL.pupil;
  ctx.beginPath(); ctx.arc(ex+Math.cos(p.eyeAng)*eR*.4, ey+Math.sin(p.eyeAng)*eR*.4, eR*.45,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.beginPath(); ctx.arc(ex-eR*.3, ey-eR*.3, eR*.22,0,Math.PI*2); ctx.fill();
  if(p.blinking>0){
    ctx.fillStyle=PAL.player;
    ctx.fillRect(-hw,-hh,w,h/2);
  }
  ctx.restore();

  if(state.gravFlip){
    ctx.strokeStyle='rgba(255,0,170,.5)'; ctx.lineWidth=1;
    ctx.setLineDash([2,2]); ctx.strokeRect(px-2,py-2,w+4,h+4); ctx.setLineDash([]);
  }
}

function drawDeathAnim(){
  if(!state.dying) return;
  const p=state.player;
  const t=1-(state.deathTimer/60);
  const n=8;
  for(let i=0;i<n;i++){
    const ang=(i/n)*Math.PI*2 + t*4;
    const dist=t*CS*1.8;
    const cx=p.x+PLAYER_W/2+Math.cos(ang)*dist;
    const cy=p.y+PLAYER_H/2+Math.sin(ang)*dist;
    const sz=(1-t)*8;
    ctx.fillStyle=`rgba(255,50,64,${1-t})`;
    ctx.fillRect(cx-sz/2, cy-sz/2, sz, sz);
  }
  ctx.save();
  ctx.globalAlpha=1-t;
  ctx.fillStyle=PAL.eye;
  ctx.beginPath(); ctx.arc(p.x+PLAYER_W/2, p.y+PLAYER_H/2-t*30, 6*(1-t*.8),0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawBackground(){
  ctx.fillStyle=PAL.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(20,40,60,.4)'; ctx.lineWidth=.5;
  for(let x=0;x<canvas.width;x+=CS){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for(let y=0;y<canvas.height;y+=CS){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
}

function drawGravFlipFX(){
  if(!state.gravFlip) return;
  ctx.fillStyle=`rgba(255,0,170,${.04+Math.sin(Date.now()*.01)*.02})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawFlash(){
  if(state.flashTimer>0){
    ctx.fillStyle=`rgba(255,50,64,${state.flashTimer/8*.45})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
}

function render(){
  drawBackground();
  drawGravFlipFX();
  const lvl=state.lvl;
  for(let r=0;r<lvl.ph;r++) for(let c=0;c<lvl.pw;c++){
    const t=tileAt(c,r);
    if(t!==0) drawTile(c,r,t);
  }
  drawFallingBlocks();
  drawPlayer();
  drawDeathAnim();
  drawFlash();
}

// INPUT
const keys={left:false,right:false,jump:false,jumpJustPressed:false};
let _jumpWasDown=false;

document.addEventListener('keydown',e=>{
  if(e.key==='p'||e.key==='P'||e.key==='Escape'){ togglePause(); return; }
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  if((e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W')&&!_jumpWasDown){
    keys.jump=true; keys.jumpJustPressed=true; _jumpWasDown=true;
  }
  e.preventDefault();
},{passive:false});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W'){keys.jump=false;_jumpWasDown=false;}
});

function bindBtn(id, keyName){
  const el=document.getElementById(id);
  if(!el) return;
  function down(e){ e.preventDefault(); keys[keyName]=true; if(keyName==='jump'&&!_jumpWasDown){keys.jumpJustPressed=true;_jumpWasDown=true;} el.classList.add('pressed'); }
  function up(e){ e.preventDefault(); keys[keyName]=false; if(keyName==='jump') _jumpWasDown=false; el.classList.remove('pressed'); }
  el.addEventListener('touchstart',down,{passive:false});
  el.addEventListener('touchend',up,{passive:false});
  el.addEventListener('mousedown',down);
  el.addEventListener('mouseup',up);
  el.addEventListener('mouseleave',up);
}
bindBtn('btn-l','left');
bindBtn('btn-r','right');
bindBtn('btn-jump','jump');

// GAME LOOP
let lastTime=0;
let fpsTime=0, fpsCount=0, currentFPS=60;
const TARGET_FPS=60, FRAME_TIME=1000/TARGET_FPS;
function loop(ts){
  requestAnimationFrame(loop);
  if(!state.running || state.paused) return;
  
  fpsTime+=ts-lastTime;
  fpsCount++;
  if(fpsTime>=1000){currentFPS=fpsCount;fpsCount=0;fpsTime=0;}
  
  const elapsed=ts-lastTime;
  if(elapsed<FRAME_TIME) return;
  lastTime=ts-(elapsed%FRAME_TIME);

  if(state.flashTimer>0) state.flashTimer--;
  if(state.invinTimer>0) state.invinTimer--;
  if(state.gravTimer>0){ state.gravTimer--; if(state.gravTimer===0){ state.gravFlip=false; showMsg('GRAVITY RESTORED'); }}

  if(state.dying){
    state.deathTimer--;
    if(state.deathTimer<=0) respawn();
    render(); return;
  }

  const p=state.player;
  const gDir = state.gravFlip ? -1 : 1;
  p.vy += GRAVITY * gDir;
  if(Math.abs(p.vy)>MAX_FALL) p.vy=MAX_FALL*Math.sign(p.vy);

  if(keys.left){ p.vx -= 1.8; }
  if(keys.right){ p.vx += 1.8; }

  p.vx *= FRIC_NORM;
  if(Math.abs(p.vx)>MOVE_SPD) p.vx=MOVE_SPD*Math.sign(p.vx);

  if(keys.jumpJustPressed){
    if(p.onGround || state.gravFlip){ p.vy=JUMP_VEL*(state.gravFlip?-1:1); p.onGround=false; sfx('jump'); }
  }
  keys.jumpJustPressed=false;

  p.trailPts.push({x:p.x,y:p.y});
  if(p.trailPts.length>6) p.trailPts.shift();

  const wasGround=p.onGround; p.onGround=false;
  const {nx,ny}=collideTiles(p.x,p.y,p.vx,p.vy);
  if(!wasGround && p.onGround && p.vy>2){ sfx('land'); p.stretch=1+(p.vy*.05); }
  p.x=nx; p.y=ny;

  p.stretch += (1-p.stretch)*.25;
  p.lean += (p.vx - p.lean)*.2;

  if(Math.random()<.003) p.blinking=8;
  if(p.blinking>0) p.blinking--;

  const ang = Math.atan2(p.vy*0.3, p.vx);
  p.eyeAng += (ang-p.eyeAng)*.15;

  // ALL spikes kill!
  if(touchesSpike(p.x,p.y)) killPlayer();
  if(p.y>canvas.height+CS||p.y<-CS*2) killPlayer();

  checkTriggers();
  updateFallingBlocks();

  // Exit check
  const w=PLAYER_W, h=PLAYER_H;
  const c0=Math.floor(p.x/CS), c1=Math.floor((p.x+w-1)/CS);
  const r0=Math.floor(p.y/CS), r1=Math.floor((p.y+h-1)/CS);
  for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
    if(tileAt(c,r)===8){ handleExit(c,r); break; }
  }

  render();
}

function startGame(){
  initAudio();
  hideOverlay();
  loadLevel(0);
  state.running=true;
  state.paused=false;
  lastTime=performance.now();
}

document.getElementById('ov-btn').addEventListener('click',()=>{ initAudio(); startGame(); },{once:true});
document.getElementById('ov-btn').addEventListener('touchstart',e=>{ e.preventDefault(); initAudio(); startGame(); },{once:true,passive:false});

window.addEventListener('resize',()=>{ if(state.running) resizeCanvas(); });

resizeCanvas();
requestAnimationFrame(loop);
</script>
