<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#00ffcc">
  <title>FLUXTRAP</title>
  <style>
    :root{--c:#00ffcc;--bg:#04060f}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:monospace}
    #arena{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
    canvas{display:block}
    #btn-start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      padding:20px 50px;font-size:28px;background:var(--c);border:none;cursor:pointer;
      font-family:monospace;font-weight:bold}
    #btn-start:disabled{opacity:0.3;cursor:wait}
  </style>
</head>
<body>
  <div id="arena">
    <canvas id="c"></canvas>
    <button id="btn-start" disabled>LOADING...</button>
  </div>
  <script>
    console.log('1. HTML cargado');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('btn-start');
    let gameStarted = false;
    let levels = [];
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    function drawText(text, sub) {
      ctx.fillStyle = '#04060f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(text, canvas.width/2, canvas.height/2 - 20);
      if (sub) {
        ctx.font = '18px monospace';
        ctx.fillStyle = '#ff00aa';
        ctx.fillText(sub, canvas.width/2, canvas.height/2 + 30);
      }
    }
    
    drawText('FLUXTRAP', 'LOADING...');
    console.log('2. Canvas preparado');
    
    fetch('./mapa.json').then(res => {
      if (!res.ok) throw new Error('Failed');
      return res.json();
    }).then(data => {
      console.log('3. JSON cargado:', data.length, 'niveles');
      levels = data;
      btn.textContent = 'TAP TO START';
      btn.disabled = false;
      btn.onclick = startGame;
    }).catch(err => {
      console.error('Error:', err);
      drawText('ERROR', 'mapa.json no cargado');
      alert('Error: No se pudo cargar el mapa.json');
    });
    
    function startGame() {
      if (gameStarted || btn.disabled) return;
      console.log('4. Juego iniciada!');
      gameStarted = true;
      btn.style.display = 'none';
      
      const PLAYER_W = 16, PLAYER_H = 18, CS = 20;
      const GRAVITY = 900, JUMP_VEL = -380, MOVE_SPD = 150;
      let player = { x: 0, y: 0, vx: 0, vy: 0, onGround: false };
      let keys = { left: false, right: false, jump: false };
      let lvlIdx = 0, deaths = 0;
      let tiles = [];
      
      function loadLevel(idx) {
        const lvl = levels[idx];
        if (!lvl) return;
        tiles = [];
        for (let r = 0; r < lvl.map.length; r++) tiles[r] = [...lvl.map[r]];
        player.x = lvl.sx * CS + CS/2 - PLAYER_W/2;
        player.y = lvl.sy * CS - PLAYER_H;
        player.vx = 0; player.vy = 0;
      }
      
      loadLevel(0);
      console.log('5. Nivel cargado, loop iniciado');
      
      window.addEventListener('keydown', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'Space' || e.code === 'ArrowUp') keys.jump = true;
      });
      window.addEventListener('keyup', e => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if (e.code === 'Space' || e.code === 'ArrowUp') keys.jump = false;
      });
      
      canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const x = e.touches[0].clientX;
        keys.left = x < canvas.width/2;
        keys.right = x >= canvas.width/2;
        keys.jump = true;
      }, {passive:false});
      canvas.addEventListener('touchend', e => {
        keys.left = keys.right = keys.jump = false;
      }, {passive:false});
      
      function isSolid(t) { return t === 1 || t === 5 || t === 6; }
      function getTile(c,r) { return tiles[r] && tiles[r][c]; }
      
      function sweep(x, y, dx) {
        if (dx === 0) return { nx: x, hit: false };
        const nx = x + dx;
        const col = dx > 0 ? Math.floor((nx + PLAYER_W - 1) / CS) : Math.floor(nx / CS);
        const r0 = Math.floor(y / CS), r1 = Math.floor((y + PLAYER_H - 1) / CS);
        for (let r = r0; r <= r1; r++) if (isSolid(getTile(col, r))) return { nx: col*CS - PLAYER_W, hit: true };
        return { nx, hit: false };
      }
      function sweepY(x, y, dy) {
        if (dy === 0) return { ny: y, hit: false };
        const ny = y + dy;
        const row = dy > 0 ? Math.floor((ny + PLAYER_H - 1) / CS) : Math.floor(ny / CS);
        const c0 = Math.floor(x / CS), c1 = Math.floor((x + PLAYER_W - 1) / CS);
        for (let c = c0; c <= c1; c++) if (isSolid(getTile(c, row))) return { ny: row*CS - PLAYER_H, hit: true };
        return { ny, hit: false };
      }
      
      function checkSpikes() {
        const c0 = Math.floor(player.x/CS), c1 = Math.floor((player.x+PLAYER_W-1)/CS);
        const r0 = Math.floor(player.y/CS), r1 = Math.floor((player.y+PLAYER_H-1)/CS);
        for (let r = r0; r <= r1; r++) for (let c = c0; c <= c1; c++) {
          if (getTile(c,r) === 3 || getTile(c,r) === 4) return true;
        }
        return false;
      }
      
      function update(dt) {
        const p = player;
        p.vy += GRAVITY * dt;
        p.vx = keys.left ? -MOVE_SPD : (keys.right ? MOVE_SPD : 0);
        if (keys.jump && p.onGround) { p.vy = JUMP_VEL; p.onGround = false; }
        
        let r = sweep(p.x, p.y, p.vx*dt);
        if (r.hit) p.vx = 0; else p.x = r.nx;
        r = sweepY(p.x, p.y, p.vy*dt);
        if (r.hit) { p.onGround = true; p.vy = 0; p.y = Math.round(r.ny); }
        else p.y = r.ny;
        
        if (checkSpikes()) { loadLevel(lvlIdx); deaths++; document.getElementById('hv-deaths').textContent = deaths; }
        
        const ec = Math.floor((p.x+PLAYER_W/2)/CS), er = Math.floor((p.y+PLAYER_H/2)/CS);
        if (getTile(ec,er) === 8) { lvlIdx = (lvlIdx + 1) % levels.length; loadLevel(lvlIdx); }
      }
      
      function render() {
        const lvl = levels[lvlIdx];
        if (!lvl) return;
        ctx.fillStyle = '#04060f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const ox = (canvas.width - lvl.pw*CS)/2, oy = (canvas.height - lvl.ph*CS)/2;
        ctx.save();
        ctx.translate(ox, oy);
        for (let r = 0; r < lvl.ph; r++) for (let c = 0; c < lvl.pw; c++) {
          const t = getTile(c,r), x = c*CS, y = r*CS;
          if (t === 1) { ctx.fillStyle = '#0e2030'; ctx.fillRect(x,y,CS,CS); ctx.fillStyle = '#1a3a50'; ctx.fillRect(x+2,y+2,CS-4,CS-4); }
          else if (t === 3 || t === 4) { ctx.fillStyle = '#ff3040'; ctx.beginPath(); ctx.moveTo(x,y+CS); ctx.lineTo(x+CS/2,y); ctx.lineTo(x+CS,y+CS); ctx.fill(); }
          else if (t === 8) { ctx.fillStyle = '#00ffcc'; ctx.fillRect(x+4,y+4,CS-8,CS-8); }
        }
        ctx.fillStyle = '#e0f0ff';
        ctx.fillRect(player.x, player.y, PLAYER_W, PLAYER_H);
        ctx.restore();
      }
      
      let lastTime = 0;
      function loop(ts) {
        if (!gameStarted) return;
        requestAnimationFrame(loop);
        if (lastTime === 0) lastTime = ts;
        update(1/60);
        render();
        lastTime = ts;
      }
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
