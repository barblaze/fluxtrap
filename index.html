<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00ffcc">
<meta name="description" content="FLUXTRAP - A masocore platformer where nothing is fair and everything kills you.">
<title>FLUXTRAP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

:root{
  --c:#00ffcc;--m:#ff00aa;--w:#ffffff;--bg:#04060f;--hud:#080c18;
  --y:#ffe040;--r:#ff3040;--dim:#0a1020;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  font-family:'Share Tech Mono',monospace;
  touch-action:none;user-select:none;
}

#root{display:flex;flex-direction:column;width:100%;height:100%}
#hud-top{
  background:var(--hud);border-bottom:1px solid #0f2030;
  padding:5px 12px;padding-top:calc(var(--st)+5px);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:8px
}
#arena{flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;min-height:0;background:var(--bg)}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ctrl-bar{
  background:var(--hud);border-top:1px solid #0f2030;
  padding:8px 16px;padding-bottom:calc(8px + var(--sb));
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0
}
@media (hover: hover) and (pointer: fine) {
  #ctrl-bar{display:none}
  #hud-top{padding-bottom:8px}
}

.hud-grp{display:flex;flex-direction:column;align-items:center;gap:1px}
.hud-lbl{font-size:8px;color:#335;letter-spacing:2px;text-transform:uppercase}
.hud-val{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--c)}
#h-lvl .hud-val{color:var(--m)}
#h-deaths .hud-val{color:var(--r)}
#h-msg{
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  color:var(--y);letter-spacing:1px;text-align:center;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:0;transition:opacity .2s
}
#h-msg.show{opacity:1}

.btn-grp{display:flex;gap:8px}
.ctrl-btn{
  border-radius:8px;background:#080c18;
  border:1px solid #1a2a3a;color:#557;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .08s;flex-shrink:0
}
.ctrl-btn:active,.ctrl-btn.pressed{
  background:#0a2030;border-color:var(--c);color:var(--c);
  box-shadow:0 0 8px var(--c)
}
.dir-btn{width:52px;height:52px;font-size:18px}
#btn-pause{font-size:14px;width:44px;height:44px}

#overlay{
  position:absolute;inset:0;z-index:20;
  background:rgba(4,6,15,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .3s
}
#overlay.off{opacity:0;pointer-events:none}
#ov-pre{font-size:10px;color:#335;letter-spacing:4px;text-transform:uppercase}
#ov-title{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(28px,7vw,52px);
  color:var(--c);text-shadow:0 0 30px var(--c),0 0 60px var(--c);
  letter-spacing:4px;text-align:center;line-height:1
}
#ov-sub{font-size:12px;color:#556;letter-spacing:3px;text-align:center}
#ov-tip{
  font-size:11px;color:var(--y);letter-spacing:1px;text-align:center;
  padding:8px 16px;border:1px solid #221a00;border-radius:4px;
  background:#0a0800;max-width:280px;line-height:1.7
}
.ov-btn{
  font-family:'Orbitron',monospace;font-weight:700;
  font-size:13px;letter-spacing:3px;cursor:pointer;border:none;
  padding:12px 32px;background:var(--c);color:#000;
  clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,
    100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
  transition:background .1s;margin-top:4px
}
.ov-btn:active,.ov-btn:hover{background:#fff}
.ov-btn.alt{background:var(--m);color:#000}

#arena::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
  pointer-events:none;z-index:1
}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  25%{transform:translate(-4px,2px)}
  50%{transform:translate(4px,-2px)}
  75%{transform:translate(-2px,4px)}
}
</style>
</head>
<body>
<div id="root">
  <div id="hud-top">
    <div class="hud-grp" id="h-lvl"><div class="hud-lbl">ZONE</div><div class="hud-val" id="hv-lvl">01</div></div>
    <div id="h-msg"></div>
    <div class="hud-grp" id="h-deaths"><div class="hud-lbl">DEATHS</div><div class="hud-val" id="hv-deaths">0</div></div>
    <button class="ctrl-btn" id="btn-pause">II</button>
  </div>

  <div id="arena">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div id="ov-pre">WELCOME TO</div>
      <div id="ov-title">FLUXTRAP</div>
      <div id="ov-sub">NOTHING IS FAIR - EVERYTHING KILLS YOU</div>
      <div id="ov-tip">
        ARROWS / WASD TO MOVE - SPACE/UP TO JUMP<br>
        Reach the <span style="color:var(--c)">EXIT</span> if it lets you.
      </div>
      <button class="ov-btn" id="ov-btn">START SUFFERING</button>
    </div>
  </div>

  <div id="ctrl-bar">
    <div class="btn-grp">
      <div class="ctrl-btn dir-btn" id="btn-l"><</div>
      <div id="dpad-mid"></div>
      <div class="ctrl-btn dir-btn" id="btn-r">></div>
    </div>
    <div class="btn-grp">
      <div class="ctrl-btn act-btn" id="btn-jump">JUMP</div>
    </div>
  </div>
</div>

<script type="module" src="./game.js"></script>
</body>
</html>
