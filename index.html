<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00ffcc">
<meta name="description" content="FLUXTRAP - A masocore platformer where nothing is fair and everything kills you.">
<link rel="manifest" href="manifest.json">
<title>FLUXTRAP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

:root{
  --c:#00ffcc;--m:#ff00aa;--w:#ffffff;--bg:#04060f;--hud:#080c18;
  --y:#ffe040;--r:#ff3040;--dim:#0a1020;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  font-family:'Share Tech Mono',monospace;
  touch-action:none;user-select:none;
}

/* ── LAYOUT ── */
#root{display:flex;flex-direction:column;width:100%;height:100%}
#hud-top{
  background:var(--hud);border-bottom:1px solid #0f2030;
  padding:5px 12px;padding-top:calc(var(--st)+5px);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:8px
}
#arena{flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;min-height:0;background:var(--bg)}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ctrl-bar{
  background:var(--hud);border-top:1px solid #0f2030;
  padding:8px 16px;padding-bottom:calc(8px + var(--sb));
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0
}

/* HUD elements */
.hud-grp{display:flex;flex-direction:column;align-items:center;gap:1px}
.hud-lbl{font-size:8px;color:#335;letter-spacing:2px;text-transform:uppercase}
.hud-val{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--c)}
#h-lvl .hud-val{color:var(--m)}
#h-deaths .hud-val{color:var(--r)}
#h-msg{
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  color:var(--y);letter-spacing:1px;text-align:center;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:0;transition:opacity .2s
}
#h-msg.show{opacity:1}

/* ── CONTROLS ── */
.btn-grp{display:flex;gap:8px}
.ctrl-btn{
  border-radius:8px;background:#080c18;
  border:1px solid #1a2a3a;color:#557;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .08s;flex-shrink:0
}
.ctrl-btn:active,.ctrl-btn.pressed{
   background:#0a2030;border-color:var(--c);color:var(--c);
   box-shadow:0 0 8px var(--c)
}
.dir-btn{width:52px;height:52px;font-size:18px}
.act-btn{width:60px;height:60px;font-size:22px;border-radius:50%;
  background:#100818;border-color:#2a1a3a;color:#664}
.act-btn:active,.act-btn.pressed{
   background:#1a0828;border-color:var(--m);color:var(--m);
   box-shadow:0 0 10px var(--m)
}
#btn-jump{font-size:16px;letter-spacing:0}
#dpad-mid{width:52px;height:52px}

/* ── SETTINGS BUTTON ── */
#btn-settings{
  background:transparent;border:none;color:#335;
  font-size:18px;cursor:pointer;padding:4px
}
#btn-settings:hover{color:var(--c)}

/* ── OVERLAY ── */
#overlay{
  position:absolute;inset:0;z-index:20;
  background:rgba(4,6,15,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .3s
}
#overlay.off{opacity:0;pointer-events:none}
#ov-pre{font-size:10px;color:#335;letter-spacing:4px;text-transform:uppercase}
#ov-title{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(28px,7vw,52px);
  color:var(--c);text-shadow:0 0 30px var(--c),0 0 60px var(--c)66;
  letter-spacing:4px;text-align:center;line-height:1
}
#ov-sub{font-size:12px;color:#556;letter-spacing:3px;text-align:center;padding:0 20px}
#ov-tip{
  font-size:11px;color:var(--y);letter-spacing:1px;text-align:center;
  padding:8px 16px;border:1px solid #221a00;border-radius:4px;
  background:#0a0800;max-width:280px;line-height:1.7
}
.ov-btn{
  font-family:'Orbitron',monospace;font-weight:700;
  font-size:13px;letter-spacing:3px;cursor:pointer;border:none;
  padding:12px 32px;background:var(--c);color:#000;
  clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,
    100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
  transition:background .1s;margin-top:4px
}
.ov-btn:active,.ov-btn:hover{background:#fff}
.ov-btn.alt{background:var(--m);color:#000}

/* ── SETTINGS MODAL ── */
#settings-modal{
  position:absolute;inset:0;z-index:30;
  background:rgba(4,6,15,.95);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s
}
#settings-modal.show{opacity:1;pointer-events:auto}
.settings-content{
  background:var(--hud);border:1px solid #1a2a3a;
  border-radius:12px;padding:24px;min-width:280px;max-width:90vw
}
.settings-title{
  font-family:'Orbitron',monospace;font-size:18px;color:var(--c);
  margin-bottom:20px;text-align:center
}
.setting-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid #0f2030
}
.setting-row:last-child{border-bottom:none}
.setting-label{color:#88a;font-size:13px}
.setting-toggle{
  width:44px;height:24px;appearance:none;background:#1a2a3a;
  border-radius:12px;position:relative;cursor:pointer;
  transition:background .2s
}
.setting-toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:20px;height:20px;background:var(--c);border-radius:50%;
  transition:transform .2s
}
.setting-toggle:checked{background:var(--m)}
.setting-toggle:checked::after{transform:translateX(20px)}
.settings-close{
  margin-top:20px;width:100%;padding:12px;
  background:var(--c);border:none;border-radius:8px;
  color:#000;font-family:'Orbitron',monospace;font-weight:700;
  cursor:pointer
}
.settings-close:hover{background:#fff}

/* scan line fx */
#arena::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
  pointer-events:none;z-index:1
}
/* glitch keyframes */
@keyframes glitch{
  0%,100%{transform:none;filter:none}
  20%{transform:translate(-2px,1px);filter:hue-rotate(90deg)}
  40%{transform:translate(2px,-1px);filter:hue-rotate(-60deg)}
  60%{transform:skewX(1deg);filter:brightness(1.4)}
  80%{transform:translate(-1px,2px);filter:saturate(2)}
}
.glitch{animation:glitch .18s steps(1) forwards}
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  25%{transform:translate(-4px,2px)}
  50%{transform:translate(4px,-2px)}
  75%{transform:translate(-2px,4px)}
}
</style>
</head>
<body>
<div id="root">
  <!-- HUD -->
  <div id="hud-top">
    <div class="hud-grp" id="h-lvl"><div class="hud-lbl">ZONE</div><div class="hud-val" id="hv-lvl">01</div></div>
    <div id="h-msg"></div>
    <div class="hud-grp" id="h-deaths"><div class="hud-lbl">DEATHS</div><div class="hud-val" id="hv-deaths">0</div></div>
    <button id="btn-settings" title="Settings">[&nbsp;]</button>
  </div>

  <!-- CANVAS -->
  <div id="arena">
    <canvas id="c"></canvas>
    <!-- OVERLAY -->
    <div id="overlay">
      <div id="ov-pre">WELCOME TO</div>
      <div id="ov-title">FLUXTRAP</div>
      <div id="ov-sub">NOTHING IS FAIR - EVERYTHING KILLS YOU</div>
      <div id="ov-tip">
        &lt; &gt; MOVE | ^ or A JUMP<br>
        Reach the <span style="color:var(--c)">EXIT</span> - if it lets you.
      </div>
      <button class="ov-btn" id="ov-btn">START GAME</button>
    </div>
  </div>

  <!-- MOBILE CONTROLS -->
  <div id="ctrl-bar">
    <div class="btn-grp">
      <div class="ctrl-btn dir-btn" id="btn-l">&lt;</div>
      <div id="dpad-mid"></div>
      <div class="ctrl-btn dir-btn" id="btn-r">&gt;</div>
    </div>
    <div class="btn-grp">
      <div class="ctrl-btn act-btn" id="btn-jump">JUMP</div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal">
  <div class="settings-content">
    <div class="settings-title">SETTINGS</div>
    <div class="setting-row">
      <span class="setting-label">God Mode</span>
      <input type="checkbox" class="setting-toggle" id="opt-godmode">
    </div>
    <div class="setting-row">
      <span class="setting-label">Music</span>
      <input type="checkbox" class="setting-toggle" id="opt-music" checked>
    </div>
    <div class="setting-row">
      <span class="setting-label">Sound Effects</span>
      <input type="checkbox" class="setting-toggle" id="opt-sfx" checked>
    </div>
    <button class="settings-close" id="settings-close">CLOSE</button>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
